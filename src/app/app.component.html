<div dir="rtl" class="app-container">
  <mat-toolbar color="primary">
    <span class="toolbar-title">ניהול לקוחות ומשימות</span>
    <div class="toolbar-spacer"></div>
    <div class="nav-buttons">
      <button mat-button routerLink="/customers" routerLinkActive="active">
        <mat-icon>people</mat-icon>
        <span>לקוחות</span>
      </button>
      <button mat-button routerLink="/tasks" routerLinkActive="active">
        <mat-icon>assignment</mat-icon>
        <span>משימות</span>
      </button>
    </div>
  </mat-toolbar>

  <div class="container">
    <div class="content-container">
      <router-outlet></router-outlet>
    </div>
  </div>

  <div class="loading-overlay" *ngIf="loading$ | async">
    <mat-progress-spinner
      mode="indeterminate"
      [diameter]="48"
    ></mat-progress-spinner>
  </div>

  <footer class="app-footer">
    <div class="footer-content">
      <div class="footer-links">
        <a
          href="mailto:eladhiteclearning&#64;gmail.com"
          matTooltip="שלח לי מייל"
          class="footer-link"
        >
          <mat-icon>alternate_email</mat-icon>
          <span>eladhiteclearning&#64;gmail.com</span>
        </a>
        <a
          href="https://www.linkedin.com/in/eladyaakobovitchcodingdeveloper/"
          target="_blank"
          rel="noopener"
          matTooltip="בקר בפרופיל LinkedIn שלי"
          class="footer-link"
        >
          <mat-icon fontIcon="link"></mat-icon>
          <span>LinkedIn</span>
        </a>
        <a
          href="https://github.com/eladjak"
          target="_blank"
          rel="noopener"
          matTooltip="בקר בפרופיל GitHub שלי"
          class="footer-link"
        >
          <mat-icon fontIcon="code"></mat-icon>
          <span>GitHub</span>
        </a>
        <a
          href="tel:0525427474"
          matTooltip="התקשר אליי: 052-542-7474"
          class="footer-link"
        >
          <mat-icon>smartphone</mat-icon>
          <span>052-542-7474</span>
        </a>
      </div>
      <div class="footer-copyright">
        <span>© 2024 אלעד יעקובוביץ'</span>
      </div>
    </div>
  </footer>
</div>
