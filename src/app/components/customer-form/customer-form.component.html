<div class="customer-form-container">
  <h2>{{ isEditMode ? 'עריכת לקוח' : 'הוספת לקוח חדש' }}</h2>

  <form [formGroup]="customerForm" (ngSubmit)="onSubmit()" class="customer-form">
    <mat-form-field appearance="outline">
      <mat-label>מזהה</mat-label>
      <input matInput formControlName="id" [readonly]="isEditMode">
      <mat-error *ngIf="customerForm.get('id')?.errors?.['required']">
        שדה חובה
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>שם</mat-label>
      <input matInput formControlName="name">
      <mat-error *ngIf="customerForm.get('name')?.errors?.['required']">
        שדה חובה
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>אזור</mat-label>
      <input matInput formControlName="area">
      <mat-error *ngIf="customerForm.get('area')?.errors?.['required']">
        שדה חובה
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>טלפון</mat-label>
      <input matInput formControlName="phone">
      <mat-error *ngIf="customerForm.get('phone')?.errors?.['required']">
        שדה חובה
      </mat-error>
      <mat-error *ngIf="customerForm.get('phone')?.errors?.['pattern']">
        מספר טלפון לא תקין
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>אימייל</mat-label>
      <input matInput formControlName="email" type="email">
      <mat-error *ngIf="customerForm.get('email')?.errors?.['required']">
        שדה חובה
      </mat-error>
      <mat-error *ngIf="customerForm.get('email')?.errors?.['email']">
        כתובת אימייל לא תקינה
      </mat-error>
    </mat-form-field>

    <div class="form-actions">
      <button mat-raised-button color="primary" type="submit" [disabled]="!customerForm.valid">
        {{ isEditMode ? 'עדכן' : 'הוסף' }}
      </button>
      <button mat-button type="button" routerLink="/customers">
        ביטול
      </button>
    </div>
  </form>
</div>
